<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent App - Ηθοποιός</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
    }
    .background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
      url('images/theater.jpg') center/cover no-repeat;
      z-index: -1;
    }
    .curtain-left, .curtain-right {
      position: fixed;
      top: 0;
      width: 80px;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .curtain-left {
      left: 0;
      background: linear-gradient(to right, rgba(100,0,0,0.6), transparent);
    }
    .curtain-right {
      right: 0;
      background: linear-gradient(to left, rgba(100,0,0,0.6), transparent);
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }
    .logo {
      font-size: 16px;
      color: #c9a84c;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 32px;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 40px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      padding: 16px;
      font-size: 18px;
      font-family: 'Georgia', serif;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      box-shadow: 0 8px 30px rgba(201,168,76,0.4);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(201,168,76,0.6);
    }
    .btn-outline {
      background: transparent;
      color: #ffffff;
      border: 2px solid rgba(201,168,76,0.6);
    }
    .btn-outline:hover {
      background: rgba(201,168,76,0.15);
      border-color: #c9a84c;
      transform: translateY(-3px);
    }
    .btn-forgot {
      background: transparent;
      color: #c9a84c;
      border: none;
      font-size: 15px;
      letter-spacing: 1px;
      text-decoration: underline;
      cursor: pointer;
      font-family: 'Georgia', serif;
      margin-top: 5px;
    }
    .btn-forgot:hover { color: #e0c97f; }
    .back-link {
      margin-top: 30px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>
  <div class="container">
    <div class="logo">🎭 Ηθοποιός</div>
    <h1>Τι θέλετε να κάνετε;</h1>
    <div class="buttons">
      <a href="actor-register.html" class="btn btn-primary">Εγγραφή</a>
      <a href="actor-login.html" class="btn btn-outline">Σύνδεση</a>
      <a href="actor-forgot.html" class="btn-forgot">Ξέχασα τον κωδικό μου</a>
    </div>
    <a href="choose-role.html" class="back-link">← Πίσω</a>
  </div>
</body>
</html>
