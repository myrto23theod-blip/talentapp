<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent App - Προφίλ Σκηνοθέτη</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: #111;
      color: #fff;
    }
    .header {
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border-bottom: 2px solid rgba(201,168,76,0.3);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo { font-size: 14px; color: #c9a84c; letter-spacing: 3px; }
    .header-title { font-size: 18px; color: #fff; }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      color: #c9a84c;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Georgia', serif;
    }
    .profile-hero {
      background: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
      url('images/theater.jpg') center/cover;
      padding: 40px 20px;
      text-align: center;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #c9a84c;
      margin: 0 auto 15px;
      background: rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .profile-name { font-size: 26px; color: #fff; margin-bottom: 5px; }
    .profile-username { font-size: 14px; color: #c9a84c; margin-bottom: 15px; }
    .btn-edit {
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      padding: 10px 30px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Georgia', serif;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .btn-search {
      background: transparent;
      color: #c9a84c;
      border: 2px solid #c9a84c;
      padding: 10px 30px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Georgia', serif;
      letter-spacing: 1px;
      margin-left: 10px;
    }
    .content {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
    }
    .section-title {
      font-size: 13px;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding-bottom: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 13px; color: rgba(255,255,255,0.5); }
    .info-value { font-size: 14px; color: #fff; text-align: right; max-width: 60%; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
    }
    .modal.active { display: block; }
