Πάτα "Add file" → "Create new file" και γράψε:
director-search.html
Επικόλλησε αυτόν τον κώδικα:
html<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent App - Αναζήτηση Ηθοποιών</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: #111;
      color: #fff;
    }
    .header {
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border-bottom: 2px solid rgba(201,168,76,0.3);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo { font-size: 14px; color: #c9a84c; letter-spacing: 3px; }
    .header-title { font-size: 18px; color: #fff; }
    .btn-back {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      color: #c9a84c;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Georgia', serif;
    }
    .content {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .section-title {
      font-size: 13px;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding-bottom: 8px;
    }
    .filters {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 15px; }
    label {
      display: block;
      font-size: 13px;
      color: #e0c97f;
      margin-bottom: 5px;
    }
    select, input {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Georgia', serif;
    }
    select option { background: #1a1a1a; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .btn-search {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Georgia', serif;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s;
      margin-top: 5px;
    }
    .btn-search:hover { transform: translateY(-2px); }

    /* Results */
    .results { display: none; }
    .results.active { display: block; }
    .results-title {
      font-size: 16px;
      color: #fff;
      margin-bottom: 15px;
      text-align: center;
    }
    .actor-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      position: relative;
    }
    .actor-card.top { border-color: #c9a84c; }
    .rank-badge {
      position: absolute;
      top: -10px;
      left: 20px;
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      padding: 4px 14px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
    }
    .actor-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      margin-top: 5px;
    }
    .actor-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #c9a84c;
      background: rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      flex-shrink: 0;
    }
    .actor-name { font-size: 18px; color: #fff; margin-bottom: 3px; }
    .actor-location { font-size: 13px; color: rgba(255,255,255,0.5); }
    .score-bar-container {
      margin-bottom: 12px;
    }
    .score-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .score-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      background: linear-gradient(to right, #c9a84c, #e0c97f);
      border-radius: 3px;
    }
    .actor-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 15px;
    }
    .tag {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      color: #c9a84c;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
    }
    .btn-message {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      font-family: 'Georgia', serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
    }
    .btn-message:hover { transform: translateY(-2px); }

    /* Message Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1a1a1a;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 15px;
      padding: 25px;
      width: 100%;
      max-width: 450px;
    }
    .modal-title {
      font-size: 18px;
      color: #c9a84c;
      margin-bottom: 5px;
    }
    .modal-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Georgia', serif;
      resize: none;
    }
    textarea:focus { outline: none; border-color: #c9a84c; }
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .btn-send {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Georgia', serif;
    }
    .btn-cancel {
      flex: 1;
      padding: 14px;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Georgia', serif;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">🎬 TALENT APP</div>
    <div class="header-title">Αναζήτηση</div>
    <button class="btn-back" onclick="window.location.href='director-profile.html'">← Πίσω</button>
  </div>

  <div class="content">

    <div class="filters">
      <div class="section-title">Κριτήρια Αναζήτησης</div>

      <div class="form-group">
        <label>Φύλο</label>
        <select id="f-gender">
          <option value="">Δεν έχει σημασία</option>
          <option value="Άνδρας">Άνδρας</option>
          <option value="Γυναίκα">Γυναίκα</option>
        </select>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label>Ηλικία από</label>
          <input type="number" id="f-age-min" placeholder="π.χ. 20">
        </div>
        <div class="form-group">
          <label>Ηλικία έως</label>
          <input type="number" id="f-age-max" placeholder="π.χ. 40">
        </div>
      </div>

      <div class="form-group">
        <label>Περιοχή</label>
        <input type="text" id="f-area" placeholder="π.χ. Αθήνα">
      </div>

      <div class="form-group">
        <label>Δραματική Σχολή</label>
        <select id="f-school">
          <option value="">Δεν έχει σημασία</option>
          <option value="yes">Απαραίτητη</option>
          <option value="no">Όχι απαραίτητη</option>
        </select>
      </div>

      <div class="form-group">
        <label>Δεξιότητες (προαιρετικά)</label>
        <input type="text" id="f-skills" placeholder="π.χ. Τραγούδι, Χορός">
      </div>

      <button class="btn-search" onclick="searchActors()">🔍 ΑΝΑΖΗΤΗΣΗ</button>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="section-title">Καλύτερες Αντιστοιχίσεις</div>
      <div class="results-title" id="results-subtitle"></div>
      <div id="actors-list"></div>
    </div>

  </div>

  <!-- Message Modal -->
  <div class="modal" id="messageModal">
    <div class="modal-content">
      <div class="modal-title">✉️ Αποστολή Μηνύματος</div>
      <div class="modal-subtitle" id="modal-actor-name"></div>
      <textarea id="message-text" rows="5" placeholder="Γράψτε το μήνυμά σας... π.χ. Σας επιλέξαμε για τον ρόλο του/της... Παρακαλώ επικοινωνήστε μαζί μας."></textarea>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeMessage()">Ακύρωση</button>
        <button class="btn-send" onclick="sendMessage()">ΑΠΟΣΤΟΛΗ ✉️</button>
      </div>
    </div>
  </div>

  <script>
    const actors = [
      {
        name: "Μαρία Παπαδοπούλου",
        location: "Αθήνα",
        age: 28,
        gender: "Γυναίκα",
        school: true,
        skills: ["Τραγούδι", "Χορός", "Ξιφασκία"],
        languages: "Αγγλικά, Γαλλικά",
        series: true,
        car: true,
        score: 95
      },
      {
        name: "Γιώργος Νικολάου",
        location: "Θεσσαλονίκη",
        age: 32,
        gender: "Άνδρας",
        school: true,
        skills: ["Χορός", "Ιππασία"],
        languages: "Αγγλικά",
        series: false,
        car: true,
        score: 88
      },
      {
        name: "Ελένη Κωνσταντίνου",
        location: "Αθήνα",
        age: 25,
        gender: "Γυναίκα",
        school: false,
        skills: ["Τραγούδι", "Ακροβατικά"],
        languages: "Αγγλικά, Γερμανικά",
        series: true,
        car: false,
        score: 82
      },
      {
        name: "Δημήτρης Αλεξίου",
        location: "Αθήνα",
        age: 35,
        gender: "Άνδρας",
        school: true,
        skills: ["Ξιφασκία", "Χορός", "Τραγούδι"],
        languages: "Αγγλικά, Ιταλικά",
        series: true,
        car: true,
        score: 91
      },
      {
        name: "Σοφία Παπαδάκη",
        location: "Πάτρα",
        age: 30,
        gender: "Γυναίκα",
        school: true,
        skills: ["Τραγούδι"],
        languages: "Αγγλικά",
        series: false,
        car: true,
        score: 78
      }
    ];

    function searchActors() {
      const gender = document.getElementById('f-gender').value;
      const ageMin = parseInt(document.getElementById('f-age-min').value) || 0;
      const ageMax = parseInt(document.getElementById('f-age-max').value) || 99;
      const area = document.getElementById('f-area').value.toLowerCase();
      const school = document.getElementById('f-school').value;
      const skills = document.getElementById('f-skills').value.toLowerCase();

      let filtered = actors.filter(a => {
        if (gender && a.gender !== gender) return false;
        if (a.age < ageMin || a.age > ageMax) return false;
        if (area && !a.location.toLowerCase().includes(area)) return false;
        if (school === 'yes' && !a.school) return false;
        return true;
      });

      filtered.sort((a, b) => b.score - a.score);
      const top3 = filtered.slice(0, 3);

      const list = document.getElementById('actors-list');
      const results = document.getElementById('results');
      const subtitle = document.getElementById('results-subtitle');

      if (top3.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">Δεν βρέθηκαν ηθοποιοί με αυτά τα κριτήρια.</p>';
      } else {
        subtitle.textContent = `Βρέθηκαν ${top3.length} καλύτερες αντιστοιχίσεις`;
        list.innerHTML = top3.map((a, i) => `
          <div class="actor-card ${i === 0 ? 'top' : ''}">
            ${i === 0 ? '<div class="rank-badge">🏆 #1 Καλύτερη Επιλογή</div>' : `<div class="rank-badge">#${i+1}</div>`}
            <div class="actor-header">
              <div class="actor-avatar">🎭</div>
              <div>
                <div class="actor-name">${a.name}</div>
                <div class="actor-location">📍 ${a.location} · ${a.age} ετών</div>
              </div>
            </div>
            <div class="score-bar-container">
              <div class="score-bar-label">
                <span>Βαθμολογία Αντιστοιχίας</span>
                <span>${a.score}%</span>
              </div>
              <div class="score-bar">
                <div class="score-bar-fill" style="width:${a.score}%"></div>
              </div>
            </div>
            <div class="actor-tags">
              ${a.school ? '<span class="tag">✅ Δραματική Σχολή</span>' : ''}
              ${a.series ? '<span class="tag">📺 Εμπειρία σε Σειρά</span>' : ''}
              ${a.car ? '<span class="tag">🚗 Αυτοκίνητο</span>' : ''}
              ${a.skills.map(s => `<span class="tag">${s}</span>`).join('')}
            </div>
            <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px;">
              🌐 ${a.languages}
            </div>
            <button class="btn-message" onclick="openMessage('${a.name}')">
              ✉️ Αποστολή Μηνύματος Επιλογής
            </button>
          </div>
        `).join('');
      }

      results.classList.add('active');
      results.scrollIntoView({ behavior: 'smooth' });
    }

    function openMessage(name) {
      document.getElementById('modal-actor-name').textContent = 'Προς: ' + name;
      document.getElementById('message-text').value = `Αγαπητέ/ή ${name},\n\nΣας ενημερώνουμε ότι έχετε επιλεχθεί για τον ρόλο στην παραγωγή μας.\n\nΠαρακαλούμε επικοινωνήστε μαζί μας το συντομότερο δυνατό.\n\nΜε εκτίμηση`;
      document.getElementById('messageModal').classList.add('active');
    }

    function closeMessage() {
      document.getElementById('messageModal').classList.remove('active');
    }

    function sendMessage() {
      alert('✅ Το μήνυμα στάλθηκε επιτυχώς!');
      closeMessage();
    }
  </script>

</body>
</html>
