<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent App - Επιλογή Ρόλου</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
    }
    .background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
      url('images/theater.jpg') center/cover no-repeat;
      z-index: -1;
    }
    .curtain-left, .curtain-right {
      position: fixed;
      top: 0;
      width: 80px;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .curtain-left {
      left: 0;
      background: linear-gradient(to right, rgba(100,0,0,0.6), transparent);
    }
    .curtain-right {
      right: 0;
      background: linear-gradient(to left, rgba(100,0,0,0.6), transparent);
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }
    .logo {
      font-size: 16px;
      color: #c9a84c;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 36px;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 16px;
      color: #e0c97f;
      margin-bottom: 50px;
      font-style: italic;
    }
    .roles {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .role-card {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(201,168,76,0.5);
      border-radius: 20px;
      padding: 40px 30px;
      width: 220px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      backdrop-filter: blur(8px);
    }
    .role-card:hover {
      background: rgba(201,168,76,0.15);
      border-color: #c9a84c;
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(201,168,76,0.3);
    }
    .role-icon { font-size: 60px; }
    .role-title {
      font-size: 20px;
      color: #ffffff;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .role-desc {
      font-size: 13px;
      color: #c9a84c;
      font-style: italic;
    }
    .back-link {
      margin-top: 40px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>
  <div class="container">
    <div class="logo">✦ Talent App ✦</div>
    <h1>Καλώς ήρθατε!</h1>
    <p class="subtitle">Ποιος είστε;</p>
    <div class="roles">
      <a href="actor-auth.html" class="role-card">
        <div class="role-icon">🎭</div>
        <div class="role-title">Είμαι Ηθοποιός</div>
        <div class="role-desc">Βρες την επόμενη<br>μεγάλη σου ευκαιρία</div>
      </a>
      <a href="director-auth.html" class="role-card">
        <div class="role-icon">🎬</div>
        <div class="role-title">Είμαι Σκηνοθέτης</div>
        <div class="role-desc">Βρες τους ιδανικούς<br>ηθοποιούς σου</div>
      </a>
    </div>
    <a href="index.html" class="back-link">← Πίσω</a>
  </div>
</body>
</html>
