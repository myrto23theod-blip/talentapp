<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent App - Εγγραφή Ηθοποιού</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
      url('images/theater.jpg') center/cover fixed;
      color: #fff;
      padding: 30px 20px;
    }
    .curtain-left, .curtain-right {
      position: fixed;
      top: 0; width: 60px; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .curtain-left { left: 0; background: linear-gradient(to right, rgba(100,0,0,0.6), transparent); }
    .curtain-right { right: 0; background: linear-gradient(to left, rgba(100,0,0,0.6), transparent); }
    .form-container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .logo {
      text-align: center;
      font-size: 14px;
      color: #c9a84c;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      color: #fff;
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 14px;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 25px 0 12px;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding-bottom: 6px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #e0c97f;
      margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Georgia', serif;
      transition: border 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #c9a84c;
      background: rgba(255,255,255,0.12);
    }
    select option { background: #1a1a1a; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 15px;
    }
    .upload-area {
      border: 2px dashed rgba(201,168,76,0.4);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: #c9a84c;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: #c9a84c; background: rgba(201,168,76,0.05); }
    .upload-area input { display: none; }
    .page-indicator {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .page-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(201,168,76,0.3);
    }
    .page-dot.active { background: #c9a84c; }
    .btn-next {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Georgia', serif;
      cursor: pointer;
      letter-spacing: 2px;
      margin-top: 25px;
      transition: all 0.3s;
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-decoration: none;
    }
    .back-link:hover { color: #c9a84c; }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>

  <div class="form-container">
    <div class="logo">🎭 TALENT APP</div>
    <h1>Εγγραφή Ηθοποιού</h1>

    <div class="page-indicator">
      <div class="page-dot active" id="dot1"></div>
      <div class="page-dot" id="dot2"></div>
    </div>

    <!-- ΣΕΛΙΔΑ 1 -->
    <div class="page active" id="page1">

      <div class="section-title">Βασικά Στοιχεία</div>
      <div class="two-col">
        <div class="form-group">
          <label>Όνομα *</label>
          <input type="text" placeholder="π.χ. Μαρία">
        </div>
        <div class="form-group">
          <label>Επώνυμο *</label>
          <input type="text" placeholder="π.χ. Παπαδοπούλου">
        </div>
      </div>
      <div class="two-col">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" placeholder="π.χ. maria_p">
        </div>
        <div class="form-group">
          <label>Password * (έως 8 χαρακτήρες)</label>
          <input type="password" maxlength="8" placeholder="••••••••">
        </div>
      </div>
      <div class="two-col">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" placeholder="maria@email.com">
        </div>
        <div class="form-group">
          <label>Κινητό τηλέφωνο *</label>
          <input type="tel" placeholder="69XXXXXXXX">
        </div>
      </div>

      <div class="section-title">Φυσικά Χαρακτηριστικά</div>
      <div class="two-col">
        <div class="form-group">
          <label>Ύψος (cm)</label>
          <input type="number" placeholder="π.χ. 170">
        </div>
        <div class="form-group">
          <label>Βάρος (kg)</label>
          <input type="number" placeholder="π.χ. 65">
        </div>
      </div>

      <div class="form-group">
        <label>Περιοχή κατοικίας</label>
        <input type="text" placeholder="π.χ. Αθήνα, Θεσσαλονίκη...">
      </div>

      <div class="form-group">
        <label>Βαμμένα μαλλιά;</label>
        <div class="radio-group">
          <label><input type="radio" name="hair" value="yes"> Ναι</label>
          <label><input type="radio" name="hair" value="no" checked> Όχι</label>
        </div>
      </div>

      <div class="form-group">
        <label>Τατουάζ;</label>
        <div class="radio-group">
          <label><input type="radio" name="tattoo" value="yes"> Ναι</label>
          <label><input type="radio" name="tattoo" value="no" checked> Όχι</label>
        </div>
      </div>

      <div class="form-group">
        <label>Αυτοκίνητο;</label>
        <div class="radio-group">
          <label><input type="radio" name="car" value="yes"> Ναι</label>
          <label><input type="radio" name="car" value="no" checked> Όχι</label>
        </div>
      </div>

      <div class="section-title">Ρούχα & Παπούτσια</div>
      <div class="two-col">
        <div class="form-group">
          <label>Μέγεθος μπλούζας</label>
          <select>
            <option value="">Επιλογή...</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>
        </div>
        <div class="form-group">
          <label>Μέγεθος παντελονιού</label>
          <select>
            <option value="">Επιλογή...</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Νούμερο παπουτσιών</label>
        <input type="number" placeholder="π.χ. 40">
      </div>

      <button class="btn-next" onclick="goToPage2()">ΕΠΟΜΕΝΟ →</button>
      <a href="actor-auth.html" class="back-link">← Πίσω</a>
    </div>

    <!-- ΣΕΛΙΔΑ 2 -->
    <div class="page" id="page2">

      <div class="section-title">Επαγγελματικά Στοιχεία</div>

      <div class="form-group">
        <label>Δραματική Σχολή;</label>
        <div class="radio-group">
          <label><input type="radio" name="school" value="yes" onclick="showSchool()"> Ναι</label>
          <label><input type="radio" name="school" value="no" checked onclick="hideSchool()"> Όχι</label>
        </div>
      </div>

      <div class="form-group" id="school-name" style="display:none;">
        <label>Ποια σχολή;</label>
        <input type="text" placeholder="π.χ. Εθνική Σχολή Δραματικής Τέχνης">
      </div>

      <div class="form-group">
        <label>Έχετε παίξει σε σειρά;</label>
        <div class="radio-group">
          <label><input type="radio" name="series" value="yes"> Ναι</label>
          <label><input type="radio" name="series" value="no" checked> Όχι</label>
        </div>
      </div>

      <div class="form-group">
        <label>Ξένες γλώσσες</label>
        <input type="text" placeholder="π.χ. Αγγλικά, Γαλλικά, Γερμανικά...">
      </div>

      <div class="form-group">
        <label>Δεξιότητες</label>
        <textarea rows="3" placeholder="π.χ. Τραγούδι, Χορός, Ξιφασκία, Ιππασία..."></textarea>
      </div>

      <div class="section-title">Social Media</div>
      <div class="form-group">
        <label>Instagram profile link</label>
        <input type="url" placeholder="https://instagram.com/username">
      </div>
      <div class="form-group">
        <label>Facebook profile link</label>
        <input type="url" placeholder="https://facebook.com/username">
      </div>

      <div class="section-title">Αρχεία</div>
      <div class="form-group">
        <label>Φωτογραφία προφίλ</label>
        <div class="upload-area" onclick="document.getElementById('photo').click()">
          📷 Πατήστε για να ανεβάσετε φωτογραφία
          <input type="file" id="photo" accept="image/*">
        </div>
      </div>
      <div class="form-group">
        <label>Βιογραφικό (PDF)</label>
        <div class="upload-area" onclick="document.getElementById('cv').click()">
          📄 Πατήστε για να ανεβάσετε βιογραφικό
          <input type="file" id="cv" accept=".pdf">
        </div>
      </div>

      <button class="btn-next" onclick="submitForm()">ΕΓΓΡΑΦΗ ✓</button>
      <a href="#" class="back-link" onclick="goToPage1()">← Πίσω</a>
    </div>

  </div>

  <script>
    function goToPage2() {
      document.getElementById('page1').classList.remove('active');
      document.getElementById('page2').classList.add('active');
      document.getElementById('dot1').classList.remove('active');
      document.getElementById('dot2').classList.add('active');
      window.scrollTo(0,0);
    }
    function goToPage1() {
      document.getElementById('page2').classList.remove('active');
      document.getElementById('page1').classList.add('active');
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot1').classList.add('active');
      window.scrollTo(0,0);
    }
    function showSchool() {
      document.getElementById('school-name').style.display = 'block';
    }
    function hideSchool() {
      document.getElementById('school-name').style.display = 'none';
    }
    function submitForm() {
      alert('Η εγγραφή σας ολοκληρώθηκε! Καλώς ήρθατε στο Talent App! 🎭');
      window.location.href = 'actor-auth.html';
    }
  </script>
</body>
</html>
