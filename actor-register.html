<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent App - Εγγραφή Ηθοποιού</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
      url('images/theater.jpg') center/cover fixed;
      color: #fff;
      padding: 30px 20px;
    }
    .curtain-left, .curtain-right {
      position: fixed;
      top: 0; width: 60px; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .curtain-left { left: 0; background: linear-gradient(to right, rgba(100,0,0,0.6), transparent); }
    .curtain-right { right: 0; background: linear-gradient(to left, rgba(100,0,0,0.6), transparent); }
    .form-container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .logo {
      text-align: center;
      font-size: 14px;
      color: #c9a84c;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      color: #fff;
      margin-bottom: 30px;
    }
    .section-title {
      font-size: 14px;
      color: #c9a84c;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 25px 0 12px;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding-bottom: 6px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #e0c97f;
      margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: 'Georgia', serif;
      transition: border 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #c9a84c;
      background: rgba(255,255,255,0.12);
    }
    select option { background: #1a1a1a; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 15px;
    }
    .upload-area {
      border: 2px dashed rgba(201,168,76,0.4);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: #c9a84c;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: #c9a84c; background: rgba(201,168,76,0.05); }
    .upload-area input { display: none; }
    .page-indicator {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .page-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(201,168,76,0.3);
    }
    .page-dot.active { background: #c9a84c; }
    .btn-next {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c9a84c, #e0c97f);
      color: #1a1a1a;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Georgia', serif;
      cursor: pointer;
      letter-spacing: 2px;
      margin-top: 25px;
      transition: all 0.3s;
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-decoration: none;
    }
    .back-link:hover { color: #c9a84c; }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>

  <div class="form-container">
    <div class="logo">🎭 TALENT APP</div>
    <h1>Εγγραφή Ηθοποιού</h1>

    <div class="page-indicator">
      <div class="page-dot active" id="dot1"></div>
      <div class="page-dot" id="dot2"></div>
